name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -x --tb=short
      - run: uv run mypy src/

  release:
    name: Release
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: false

      # The semantic-release action runs in its own Docker container, which
      # does not have uv on PATH, so the build happens here on the runner
      # instead of via its build_command hook.
      - name: Build distribution
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Generate SHA256 checksums for release artifacts
        if: steps.release.outputs.released == 'true'
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Upload artifacts to GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
